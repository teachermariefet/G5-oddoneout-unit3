<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hear the Odd One Out</title>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Balsamiq Sans', cursive;
            background-image: url('gamepage.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #f0f8ff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #2e5a88;
            text-shadow: 3px 3px 6px rgba(255, 255, 255, 0.9);
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .game-container {
            display: flex;
            gap: 25px;
            margin-bottom: 40px;
        }

        .box {
            width: 200px;
            height: 200px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 8px solid #ffcc00;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 12px 0 #e6b800;
        }

        .box:hover {
            transform: translateY(-10px);
            background-color: #ffffff;
        }

        .box:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #e6b800;
        }

        .box-number {
            font-size: 6rem;
            color: #ff6600;
        }

        .word-label {
            font-size: 2.5rem;
            font-weight: bold;
            display: none; 
            text-align: center;
        }

        .odd-one {
            color: #e74c3c !important; /* Red for Odd One */
        }

        .normal-word {
            color: #2ecc71; /* Green for Matches */
        }

        .controls {
            display: flex;
            gap: 25px;
        }

        button {
            font-family: 'Balsamiq Sans', cursive;
            padding: 20px 45px;
            font-size: 1.8rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15);
            text-transform: uppercase;
            font-weight: bold;
        }

        #reveal-btn { background-color: #9b59b6; }
        #next-btn { background-color: #3498db; }

        button:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <h1>Hear the Odd One Out!</h1>

    <div class="game-container">
        <div class="box" onclick="speakWord(0)">
            <span class="box-number" id="num-0">1</span>
            <span class="word-label" id="word-0"></span>
        </div>
        <div class="box" onclick="speakWord(1)">
            <span class="box-number" id="num-1">2</span>
            <span class="word-label" id="word-1"></span>
        </div>
        <div class="box" onclick="speakWord(2)">
            <span class="box-number" id="num-2">3</span>
            <span class="word-label" id="word-2"></span>
        </div>
    </div>

    <div class="controls">
        <button id="reveal-btn" onclick="revealWords()">Reveal</button>
        <button id="next-btn" onclick="initRound()">Next Round</button>
    </div>

    <script>
        // Updated Vocabulary Categories
        const categories = [
            { name: "/ch/", words: ["chicken", "church", "lunch", "chair", "catch"] },
            { name: "/sh/", words: ["shop", "short", "fish", "sheep", "wish"] }
        ];

        let currentWords = [];

        function initRound() {
            window.speechSynthesis.cancel();
            
            // Reset UI
            for (let i = 0; i < 3; i++) {
                document.getElementById(`word-${i}`).style.display = 'none';
                document.getElementById(`num-${i}`).style.display = 'block';
                document.getElementById(`word-${i}`).classList.remove('odd-one', 'normal-word');
            }

            // Decide which category provides the pair and which provides the odd one
            const isChPair = Math.random() < 0.5;
            const pairCat = isChPair ? categories[0] : categories[1];
            const oddCat = isChPair ? categories[1] : categories[0];

            // Get two unique words from the pair category
            const pairWords = [...pairCat.words].sort(() => 0.5 - Math.random()).slice(0, 2);
            // Get one word from the odd category
            const oddWord = oddCat.words[Math.floor(Math.random() * oddCat.words.length)];

            let roundSet = [
                { word: pairWords[0], isOdd: false },
                { word: pairWords[1], isOdd: false },
                { word: oddWord, isOdd: true }
            ];

            // Shuffle the positions (1, 2, or 3)
            currentWords = roundSet.sort(() => 0.5 - Math.random());
            
            currentWords.forEach((item, index) => {
                const el = document.getElementById(`word-${index}`);
                el.innerText = item.word;
                if (item.isOdd) {
                    el.classList.add('odd-one');
                } else {
                    el.classList.add('normal-word');
                }
            });
        }

        function speakWord(index) {
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(currentWords[index].word);
            
            utterance.rate = 0.75; // 25% slower for clarity
            utterance.pitch = 1.1; 
            utterance.lang = 'en-US';
            
            window.speechSynthesis.speak(utterance);
        }

        function revealWords() {
            for (let i = 0; i < 3; i++) {
                document.getElementById(`word-${i}`).style.display = 'block';
                document.getElementById(`num-${i}`).style.display = 'none';
            }
        }

        // Start first round
        initRound();
    </script>
</body>
</html>
